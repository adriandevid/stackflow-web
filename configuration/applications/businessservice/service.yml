
apiVersion: v1
kind: Service
metadata:
    name: businessservice-service
    labels:
        app: businessservice
spec:
    type: NodePort
    selector:
        app: businessservice  # Replace with your application's label
    ports:
        - port: 8080        # The port your application listens on internally
          targetPort: 8080  # The port within the pod
          nodePort: 30085
          protocol: TCP
    